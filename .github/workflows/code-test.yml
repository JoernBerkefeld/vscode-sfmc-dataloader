name: Code Testing

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - run: npm ci --no-workspaces
            - run: npm run lint
            - run: npm run compile
            - run: npm test
